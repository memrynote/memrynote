# Notes System API Contract
# Feature: 003-notes
# Date: 2025-12-23
#
# This is an IPC-based API (not HTTP). The OpenAPI format is used for
# documentation and type generation purposes.

openapi: 3.1.0
info:
  title: Memry Notes API
  version: 1.0.0
  description: |
    IPC-based API for note CRUD operations, tags, links, properties,
    and folder management. All operations are invoked via Electron IPC
    from renderer to main process.

paths:
  /notes:create:
    post:
      operationId: createNote
      summary: Create a new note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteCreateInput'
      responses:
        '200':
          description: Note created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'

  /notes:get:
    post:
      operationId: getNote
      summary: Get a note by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: Note UUID
      responses:
        '200':
          description: Note retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'

  /notes:update:
    post:
      operationId: updateNote
      summary: Update an existing note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteUpdateInput'
      responses:
        '200':
          description: Note updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'

  /notes:delete:
    post:
      operationId: deleteNote
      summary: Delete a note (moves to trash)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        '200':
          description: Note deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /notes:list:
    post:
      operationId: listNotes
      summary: List notes with filtering and pagination
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteListInput'
      responses:
        '200':
          description: Notes list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteListResponse'

  /notes:rename:
    post:
      operationId: renameNote
      summary: Rename a note (changes filename)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, newTitle]
              properties:
                id:
                  type: string
                newTitle:
                  type: string
                  minLength: 1
                  maxLength: 255
      responses:
        '200':
          description: Note renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'

  /notes:move:
    post:
      operationId: moveNote
      summary: Move a note to a different folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, newFolder]
              properties:
                id:
                  type: string
                newFolder:
                  type: string
      responses:
        '200':
          description: Note moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'

  /notes:get-tags:
    post:
      operationId: getTags
      summary: Get all tags with counts
      responses:
        '200':
          description: Tags list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsResponse'

  /notes:get-links:
    post:
      operationId: getLinks
      summary: Get outgoing and incoming links for a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        '200':
          description: Links data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinksResponse'

  /notes:get-folders:
    post:
      operationId: getFolders
      summary: Get folder tree
      responses:
        '200':
          description: Folders list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoldersResponse'

  /notes:create-folder:
    post:
      operationId: createFolder
      summary: Create a new folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
      responses:
        '200':
          description: Folder created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /notes:set-properties:
    post:
      operationId: setProperties
      summary: Set custom properties on a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPropertiesInput'
      responses:
        '200':
          description: Properties set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'

  /notes:get-property-definitions:
    post:
      operationId: getPropertyDefinitions
      summary: Get all property definitions
      responses:
        '200':
          description: Property definitions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyDefinitionsResponse'

  /notes:upload-attachment:
    post:
      operationId: uploadAttachment
      summary: Upload an attachment file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filePath, originalName]
              properties:
                filePath:
                  type: string
                  description: Temp file path
                originalName:
                  type: string
                  description: Original filename
      responses:
        '200':
          description: Attachment uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentResponse'

  /search:query:
    post:
      operationId: searchNotes
      summary: Full-text search notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchInput'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'

components:
  schemas:
    # Input Schemas
    NoteCreateInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          default: "Untitled"
        content:
          type: string
          default: ""
        folder:
          type: string
          description: Parent folder path
        tags:
          type: array
          items:
            type: string
        emoji:
          type: string
          description: Single emoji character
        properties:
          type: object
          additionalProperties: true

    NoteUpdateInput:
      type: object
      required: [id]
      properties:
        id:
          type: string
        title:
          type: string
          minLength: 1
          maxLength: 255
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        emoji:
          type: string
        properties:
          type: object
          additionalProperties: true

    NoteListInput:
      type: object
      properties:
        folder:
          type: string
          description: Filter by folder path
        tags:
          type: array
          items:
            type: string
          description: Filter by tags (AND logic)
        sortBy:
          type: string
          enum: [modified, created, title]
          default: modified
        sortOrder:
          type: string
          enum: [asc, desc]
          default: desc
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        offset:
          type: integer
          minimum: 0
          default: 0

    SetPropertiesInput:
      type: object
      required: [id, properties]
      properties:
        id:
          type: string
        properties:
          type: array
          items:
            $ref: '#/components/schemas/PropertyValue'

    SearchInput:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        folder:
          type: string
          description: Limit search to folder

    # Output Schemas
    Note:
      type: object
      required: [id, path, title, content, tags, createdAt, modifiedAt]
      properties:
        id:
          type: string
        path:
          type: string
        title:
          type: string
        emoji:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties: true
        aliases:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time

    NoteListItem:
      type: object
      required: [id, path, title, snippet, wordCount, tags, modifiedAt]
      properties:
        id:
          type: string
        path:
          type: string
        title:
          type: string
        emoji:
          type: string
        snippet:
          type: string
        wordCount:
          type: integer
        tags:
          type: array
          items:
            type: string
        modifiedAt:
          type: string
          format: date-time

    NoteLink:
      type: object
      required: [sourceId, targetTitle, exists]
      properties:
        sourceId:
          type: string
        targetId:
          type: string
          nullable: true
        targetTitle:
          type: string
        exists:
          type: boolean

    Backlink:
      type: object
      required: [sourceId, sourceTitle, sourcePath, context]
      properties:
        sourceId:
          type: string
        sourceTitle:
          type: string
        sourcePath:
          type: string
        context:
          type: string
          description: Snippet around the link

    Tag:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer
        color:
          type: string
          description: Hex color code

    Folder:
      type: object
      required: [path, name]
      properties:
        path:
          type: string
        name:
          type: string
        noteCount:
          type: integer
        children:
          type: array
          items:
            $ref: '#/components/schemas/Folder'

    PropertyValue:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        value:
          description: Value type depends on property type
        type:
          type: string
          enum: [text, number, checkbox, date, select, multiselect, url, rating]

    PropertyDefinition:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [text, number, checkbox, date, select, multiselect, url, rating]
        options:
          type: array
          items:
            type: string
          description: For select/multiselect types
        defaultValue:
          type: string

    SearchResult:
      type: object
      required: [id, title, path, snippet, score]
      properties:
        id:
          type: string
        title:
          type: string
        path:
          type: string
        snippet:
          type: string
          description: HTML with <mark> highlights
        score:
          type: number
        tags:
          type: array
          items:
            type: string

    Attachment:
      type: object
      required: [path, originalName, size, mimeType]
      properties:
        path:
          type: string
          description: Relative path in attachments folder
        originalName:
          type: string
        size:
          type: integer
        mimeType:
          type: string
        markdown:
          type: string
          description: Markdown syntax to insert

    # Response Wrappers
    NoteResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        note:
          $ref: '#/components/schemas/Note'
        error:
          type: string

    NoteListResponse:
      type: object
      required: [notes, total, hasMore]
      properties:
        notes:
          type: array
          items:
            $ref: '#/components/schemas/NoteListItem'
        total:
          type: integer
        hasMore:
          type: boolean

    TagsResponse:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'

    LinksResponse:
      type: object
      required: [outgoing, incoming]
      properties:
        outgoing:
          type: array
          items:
            $ref: '#/components/schemas/NoteLink'
        incoming:
          type: array
          items:
            $ref: '#/components/schemas/Backlink'

    FoldersResponse:
      type: object
      required: [folders]
      properties:
        folders:
          type: array
          items:
            $ref: '#/components/schemas/Folder'

    PropertyDefinitionsResponse:
      type: object
      required: [definitions]
      properties:
        definitions:
          type: array
          items:
            $ref: '#/components/schemas/PropertyDefinition'

    SearchResponse:
      type: object
      required: [results, total]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        total:
          type: integer
        query:
          type: string

    AttachmentResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        attachment:
          $ref: '#/components/schemas/Attachment'
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        error:
          type: string

# IPC Events (one-way, main → renderer)
x-ipc-events:
  notes:created:
    description: Emitted when a note is created
    payload:
      $ref: '#/components/schemas/Note'
    meta:
      source:
        type: string
        enum: [internal, external]

  notes:updated:
    description: Emitted when a note is updated
    payload:
      $ref: '#/components/schemas/Note'
    meta:
      source:
        type: string
        enum: [internal, external]

  notes:deleted:
    description: Emitted when a note is deleted
    payload:
      type: object
      properties:
        id:
          type: string
        path:
          type: string

  notes:renamed:
    description: Emitted when a note is renamed
    payload:
      type: object
      properties:
        id:
          type: string
        oldPath:
          type: string
        newPath:
          type: string
        oldTitle:
          type: string
        newTitle:
          type: string

  notes:moved:
    description: Emitted when a note is moved
    payload:
      type: object
      properties:
        id:
          type: string
        oldPath:
          type: string
        newPath:
          type: string

  notes:external-change:
    description: Emitted when a note is changed externally
    payload:
      $ref: '#/components/schemas/Note'
