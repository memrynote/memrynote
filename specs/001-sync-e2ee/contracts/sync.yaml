openapi: 3.1.0
info:
  title: Memry Sync API - Sync Operations
  version: 1.0.0
  description: Push/pull sync endpoints for encrypted items

servers:
  - url: https://sync.memry.app/v1
    description: Production

paths:
  /sync/status:
    get:
      operationId: getSyncStatus
      summary: Get current sync status
      tags: [Sync]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatus'

  /sync/manifest:
    get:
      operationId: getManifest
      summary: Get list of all user's synced items
      description: Used for initial sync on new device
      tags: [Sync]
      security:
        - bearerAuth: []
      parameters:
        - name: types
          in: query
          description: Filter by item types
          schema:
            type: array
            items:
              type: string
              enum: [note, task, project, settings, attachment]
      responses:
        '200':
          description: Item manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncManifest'

  /sync/changes:
    get:
      operationId: getChanges
      summary: Get items changed since timestamp
      tags: [Sync]
      security:
        - bearerAuth: []
      parameters:
        - name: since
          in: query
          required: true
          schema:
            type: integer
            description: Unix timestamp (milliseconds)
        - name: types
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [note, task, project, settings, attachment]
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Changed items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangesResponse'

  /sync/push:
    post:
      operationId: pushItems
      summary: Push local changes to server
      tags: [Sync]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushRequest'
      responses:
        '200':
          description: Push results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Conflict detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictResponse'

  /sync/pull:
    post:
      operationId: pullItems
      summary: Request specific items from server
      tags: [Sync]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_ids]
              properties:
                item_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  maxItems: 100
      responses:
        '200':
          description: Requested items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SyncItemWithBlob'

  /sync/items/{item_id}:
    get:
      operationId: getItem
      summary: Get a specific sync item
      tags: [Sync]
      security:
        - bearerAuth: []
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncItemWithBlob'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteItem
      summary: Mark item as deleted
      tags: [Sync]
      security:
        - bearerAuth: []
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Item deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /sync/notes/{note_id}/updates:
    post:
      operationId: pushNoteUpdate
      summary: Push incremental Yjs update for a note
      tags: [Sync, Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: note_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteUpdate'
      responses:
        '200':
          description: Update accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean
                  needs_snapshot:
                    type: boolean
                    description: True if server wants full snapshot
        '404':
          $ref: '#/components/responses/NotFound'

    get:
      operationId: getNoteUpdates
      summary: Get incremental updates for a note
      tags: [Sync, Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: note_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: since_state_vector
          in: query
          schema:
            type: string
            description: Base64 encoded Yjs state vector
      responses:
        '200':
          description: Updates since state vector
          content:
            application/json:
              schema:
                type: object
                properties:
                  updates:
                    type: array
                    items:
                      $ref: '#/components/schemas/NoteUpdate'
                  current_state_vector:
                    type: string

  /sync/notes/{note_id}/snapshot:
    put:
      operationId: pushNoteSnapshot
      summary: Push full Yjs snapshot for a note
      tags: [Sync, Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: note_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteSnapshot'
      responses:
        '200':
          description: Snapshot stored
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      operationId: getNoteSnapshot
      summary: Get full Yjs snapshot for a note
      tags: [Sync, Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: note_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Note snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteSnapshot'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # Rate Limiting Configuration
  x-rate-limits:
    sync-push:
      description: Push sync operations
      requests: 100
      window: 60
      unit: seconds
      per: user
      burst: 20
      notes: Allows burst for initial sync

    sync-pull:
      description: Pull sync operations
      requests: 200
      window: 60
      unit: seconds
      per: user
      notes: Higher limit for read operations

    sync-manifest:
      description: Full manifest fetch (expensive operation)
      requests: 10
      window: 60
      unit: seconds
      per: user

    note-updates:
      description: CRDT incremental updates
      requests: 300
      window: 60
      unit: seconds
      per: user
      notes: High frequency for real-time editing

    websocket-messages:
      description: WebSocket message rate
      requests: 100
      window: 10
      unit: seconds
      per: connection
      notes: Per WebSocket connection

  schemas:
    SyncStatus:
      type: object
      properties:
        connected:
          type: boolean
        last_sync_at:
          type: string
          format: date-time
        pending_items:
          type: integer
        server_time:
          type: integer
          description: Server timestamp (milliseconds)

    SyncManifest:
      type: object
      properties:
        notes:
          type: array
          items:
            $ref: '#/components/schemas/SyncItemRef'
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/SyncItemRef'
        projects:
          type: array
          items:
            $ref: '#/components/schemas/SyncItemRef'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/SyncItemRef'
        settings:
          $ref: '#/components/schemas/SyncItemRef'

    SyncItemRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [note, task, project, settings, attachment]
        version:
          type: integer
        modified_at:
          type: integer
        size:
          type: integer
        state_vector:
          type: string
          description: For CRDT items only

    ChangesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SyncItemRef'
        deleted:
          type: array
          items:
            type: string
            format: uuid
        has_more:
          type: boolean
        next_cursor:
          type: integer
          description: Timestamp for next page

    PushRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PushItem'
          maxItems: 100

    PushItem:
      type: object
      required: [id, type, operation, encrypted_data]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [note, task, project, settings, attachment]
        operation:
          type: string
          enum: [create, update, delete]
        encrypted_data:
          $ref: '#/components/schemas/EncryptedBlob'
        clock:
          type: object
          additionalProperties:
            type: integer
          description: Vector clock (for non-CRDT items)

    EncryptedBlob:
      type: object
      required: [encrypted_key, key_nonce, encrypted_data, data_nonce, signature]
      properties:
        encrypted_key:
          type: string
          description: File key encrypted with vault key (Base64)
        key_nonce:
          type: string
          description: Nonce for key encryption (Base64)
        encrypted_data:
          type: string
          description: Content encrypted with file key (Base64)
        data_nonce:
          type: string
          description: Nonce for data encryption (Base64)
        signature:
          type: string
          description: Ed25519 signature over id, type, operation, encrypted_key, key_nonce, encrypted_data, data_nonce, and clock/fieldClocks metadata (Base64)

    PushResponse:
      type: object
      properties:
        accepted:
          type: array
          items:
            type: string
            format: uuid
        rejected:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              reason:
                type: string
        server_time:
          type: integer

    ConflictResponse:
      type: object
      properties:
        conflicts:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              local_clock:
                type: object
              server_clock:
                type: object
              server_version:
                $ref: '#/components/schemas/EncryptedBlob'

    SyncItemWithBlob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        version:
          type: integer
        blob:
          $ref: '#/components/schemas/EncryptedBlob'
        clock:
          type: object
        created_at:
          type: integer
        modified_at:
          type: integer

    NoteUpdate:
      type: object
      required: [encrypted_data, nonce, signature, timestamp]
      properties:
        encrypted_data:
          type: string
          description: Encrypted Yjs update (Base64)
        nonce:
          type: string
        signature:
          type: string
          description: Ed25519 signature over note_id, encrypted_data, nonce, and timestamp (Base64)
        timestamp:
          type: integer

    NoteSnapshot:
      type: object
      required: [encrypted_snapshot, snapshot_nonce, state_vector, encrypted_key, key_nonce, signature]
      properties:
        encrypted_snapshot:
          type: string
          description: Full Yjs state (Base64)
        snapshot_nonce:
          type: string
        state_vector:
          type: string
          description: Yjs state vector (Base64, unencrypted)
        encrypted_key:
          type: string
        key_nonce:
          type: string
        signature:
          type: string
          description: Ed25519 signature over note_id, encrypted_snapshot, snapshot_nonce, state_vector, encrypted_key, and key_nonce (Base64)
        updates:
          type: array
          items:
            $ref: '#/components/schemas/NoteUpdate'
          description: Incremental updates since snapshot

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
