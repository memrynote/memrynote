openapi: 3.1.0
info:
  title: Memry Sync API - Blob Storage
  version: 1.0.0
  description: Encrypted blob and attachment chunk storage endpoints

servers:
  - url: https://sync.memry.app/v1
    description: Production

paths:
  /blob/{blob_key}:
    put:
      operationId: uploadBlob
      summary: Upload encrypted blob
      tags: [Blob]
      security:
        - bearerAuth: []
      parameters:
        - name: blob_key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Blob uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  blob_key:
                    type: string
                  size:
                    type: integer
                  etag:
                    type: string
        '413':
          description: Blob too large

    get:
      operationId: downloadBlob
      summary: Download encrypted blob
      tags: [Blob]
      security:
        - bearerAuth: []
      parameters:
        - name: blob_key
          in: path
          required: true
          schema:
            type: string
        - name: Range
          in: header
          schema:
            type: string
            description: Byte range for partial download
      responses:
        '200':
          description: Blob data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteBlob
      summary: Delete encrypted blob
      tags: [Blob]
      security:
        - bearerAuth: []
      parameters:
        - name: blob_key
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Blob deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /attachments/upload/initiate:
    post:
      operationId: initiateUpload
      summary: Start chunked attachment upload
      tags: [Attachments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attachment_id, filename, size, chunk_count]
              properties:
                attachment_id:
                  type: string
                  format: uuid
                filename:
                  type: string
                  description: Encrypted filename
                size:
                  type: integer
                  description: Total file size in bytes
                chunk_count:
                  type: integer
                  description: Number of 8MB chunks
                mime_type:
                  type: string
      responses:
        '201':
          description: Upload session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          description: File too large (max 500MB)
        '507':
          description: Storage quota exceeded

  /attachments/upload/{session_id}/chunk/{chunk_index}:
    put:
      operationId: uploadChunk
      summary: Upload attachment chunk
      tags: [Attachments]
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: chunk_index
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Chunk uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  chunk_index:
                    type: integer
                  hash:
                    type: string
                    description: SHA-256 of chunk
                  encrypted_hash:
                    type: string
                    description: SHA-256 of encrypted chunk
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Upload session not found
        '409':
          description: Chunk already uploaded
        '410':
          description: Upload session expired

  /attachments/upload/{session_id}/complete:
    post:
      operationId: completeUpload
      summary: Complete chunked upload
      tags: [Attachments]
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [manifest]
              properties:
                manifest:
                  $ref: '#/components/schemas/EncryptedAttachmentManifest'
      responses:
        '200':
          description: Upload complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachment_id:
                    type: string
                  manifest_key:
                    type: string
                  size:
                    type: integer
        '400':
          description: Missing chunks
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  missing_chunks:
                    type: array
                    items:
                      type: integer
        '404':
          description: Upload session not found

  /attachments/upload/{session_id}:
    get:
      operationId: getUploadStatus
      summary: Get upload session status
      tags: [Attachments]
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Upload status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSession'
        '404':
          description: Session not found

    delete:
      operationId: cancelUpload
      summary: Cancel upload session
      tags: [Attachments]
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Upload cancelled
        '404':
          description: Session not found

  /attachments/{attachment_id}/manifest:
    get:
      operationId: getManifest
      summary: Get attachment manifest
      tags: [Attachments]
      security:
        - bearerAuth: []
      parameters:
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Attachment manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncryptedAttachmentManifest'
        '404':
          $ref: '#/components/responses/NotFound'

  /attachments/chunks/{chunk_hash}:
    get:
      operationId: downloadChunk
      summary: Download attachment chunk by hash
      tags: [Attachments]
      security:
        - bearerAuth: []
      parameters:
        - name: chunk_hash
          in: path
          required: true
          schema:
            type: string
            description: SHA-256 hash of plaintext chunk
      responses:
        '200':
          description: Chunk data
          content:
            application/json:
              schema:
                type: object
                properties:
                  encrypted_data:
                    type: string
                    description: Base64 encrypted chunk
                  nonce:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

    head:
      operationId: checkChunkExists
      summary: Check if chunk exists (for deduplication)
      tags: [Attachments]
      security:
        - bearerAuth: []
      parameters:
        - name: chunk_hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chunk exists
          headers:
            X-Chunk-Size:
              schema:
                type: integer
        '404':
          description: Chunk not found

  /attachments/{attachment_id}/stream:
    get:
      operationId: streamAttachment
      summary: Stream attachment (for video playback)
      tags: [Attachments]
      security:
        - bearerAuth: []
      parameters:
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
        - name: Range
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Full content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content
          headers:
            Content-Range:
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # Rate Limiting Configuration
  x-rate-limits:
    blob-upload:
      description: Blob upload operations
      requests: 50
      window: 60
      unit: seconds
      per: user
      notes: Standard blob uploads

    chunk-upload:
      description: Attachment chunk uploads
      requests: 100
      window: 60
      unit: seconds
      per: user
      notes: Higher for chunked uploads, allows parallel chunks

    blob-download:
      description: Blob download operations
      requests: 200
      window: 60
      unit: seconds
      per: user
      notes: Higher limit for downloads

    stream:
      description: Video/media streaming
      requests: 50
      window: 60
      unit: seconds
      per: user
      notes: Range requests for streaming

    upload-sessions:
      description: Initiating new upload sessions
      requests: 20
      window: 60
      unit: seconds
      per: user
      notes: Prevents session flooding

  schemas:
    UploadSession:
      type: object
      properties:
        id:
          type: string
        attachment_id:
          type: string
        filename:
          type: string
        size:
          type: integer
        chunk_count:
          type: integer
        uploaded_chunks:
          type: array
          items:
            type: integer
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    AttachmentManifest:
      type: object
      description: Plaintext manifest structure (encrypted before upload)
      required: [id, filename, mime_type, size, checksum, chunks, chunk_size]
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
          description: Encrypted filename
        mime_type:
          type: string
        size:
          type: integer
        checksum:
          type: string
          description: SHA-256 of original file
        chunks:
          type: array
          items:
            $ref: '#/components/schemas/ChunkRef'
        chunk_size:
          type: integer
          default: 8388608
        created_at:
          type: integer

    EncryptedAttachmentManifest:
      type: object
      required: [encrypted_manifest, manifest_nonce, encrypted_file_key, key_nonce, manifest_signature]
      properties:
        encrypted_manifest:
          type: string
          description: Base64 encrypted manifest
        manifest_nonce:
          type: string
        encrypted_file_key:
          type: string
        key_nonce:
          type: string
        manifest_signature:
          type: string
          description: Ed25519 signature over encrypted manifest fields (Base64)

    ChunkRef:
      type: object
      required: [index, hash, encrypted_hash, size]
      properties:
        index:
          type: integer
        hash:
          type: string
          description: SHA-256 of plaintext chunk
        encrypted_hash:
          type: string
          description: SHA-256 of encrypted chunk
        size:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
