name: Security Audit

on:
  pull_request:
    paths:
      - package.json
      - pnpm-lock.yaml
      - apps/desktop/package.json
      - apps/sync-server/package.json
      - .github/workflows/security-audit.yml
  schedule:
    - cron: 0 7 * * 1
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-audit:
    name: Root dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level high

  sync-server-audit:
    name: Sync server dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit sync-server dependencies
        run: cd apps/sync-server && pnpm audit --audit-level high
