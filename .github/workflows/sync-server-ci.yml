name: Sync Server CI

on:
  pull_request:
    paths:
      - apps/sync-server/**
      - packages/contracts/**
      - .github/workflows/sync-server-ci.yml
  push:
    branches:
      - main
    paths:
      - apps/sync-server/**
      - packages/contracts/**
      - .github/workflows/sync-server-ci.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-server-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  sync-server:
    name: Typecheck and Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck sync-server
        run: pnpm --filter @memry/sync-server typecheck

      - name: Test sync-server
        run: pnpm rebuild better-sqlite3 && pnpm --filter @memry/sync-server test
